<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أخبار جامعة النيلين</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800;900&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6D001A;
            --primary-light: rgba(109, 0, 26, 0.2);
            --bg-dark: #0A0A0A;
            --card-bg: rgba(20, 20, 20, 0.6);
            --border-light: rgba(255, 255, 255, 0.1);
            --text-muted: #B5B5B5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Cairo', 'Tajawal', 'IBM Plex Sans Arabic', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            padding-bottom: 50px;
        }
        
        /* الهيدر الفاخر */
        .premium-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 2px solid var(--primary);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            padding: 15px 5%;
            position: sticky;
            top: 0;
        }
        
        .logo-area {
            flex: 1;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #FFFFFF 30%, #B5B5B5 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(109, 0, 26, 0.3);
            position: relative;
            display: inline-block;
        }

        .logo span {
            color: var(--primary);
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            text-shadow: 0 0 8px rgba(109, 0, 26, 0.5);
        }

        .logo::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), transparent);
        }
        
        /* أزرار التحكم */
        .icon-btn {
            background: rgba(17, 17, 17, 0.8);
            border: 1px solid var(--border-light);
            color: #fff;
            font-size: 18px;
            padding: 10px 16px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(109, 0, 26, 0.3);
        }

        /* حاوية قسم الأخبار الرئيسية */
        .main-wrapper {
            max-w: 800px;
            width: 90%;
            margin: 40px auto;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-right: 4px solid var(--primary);
            padding-right: 14px;
        }

        .section-header h2 {
            font-size: 22px;
            font-weight: 700;
        }

        /* كروت الأخبار الديناميكية */
        .news-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-light);
            padding: 24px;
            border-radius: 18px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .news-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: transparent;
            transition: background 0.3s ease;
        }

        .news-card:hover {
            transform: translateY(-4px);
            border-color: rgba(109, 0, 26, 0.4);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .news-card:hover::before {
            background: var(--primary);
        }

        .news-title {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .news-content {
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 400;
            text-align: justify;
            white-space: pre-line; /* للحفاظ على تنسيق الأسطر المرسلة من تليجرام */
        }

        .news-meta {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 12px;
        }

    </style>
</head>
<body>

    <header class="premium-header">
        <div class="logo-area">
            <div class="logo">
                <h1>Neelain<span>News</span></h1>
            </div>
        </div>
        
        <div class="News-hero">
            <button type="button" class="icon-btn">
                <i class="bi bi-bell"></i>
                <span>تنبيهات</span>
            </button>
        </div>
    </header>

    <div class="main-wrapper">
        
        <div class="section-header">
            <h2>آخر الأخبار والمستجدات</h2>
        </div>

        <main id="news-container">
            <div class="news-card">
                <h2 class="news-title">جاري الاتصال بخادم جامعة النيلين...</h2>
                <p class="news-content">يرجى الانتظار قليلاً لحين مزامنة آخر الأخبار المحدثة من الـ Termux.</p>
            </div>
        </main>

    </div>

    <script>
        // رابط الـ Serveo الفعلي الخاص بك مع إضافة مسار جلب الأخبار
        const API_URL = 'https://0c98e36467d74681-102-121-253-185.serveousercontent.com';


        async function fetchNews() {
            const container = document.getElementById('news-container');
            
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // تفريغ محتوى الانتظار
                container.innerHTML = ''; 
                
                if (data.length === 0) {
                    container.innerHTML = `
                        <div class="news-card" style="text-align: center;">
                            <h2 class="news-title" style="color: var(--text-muted);">لا توجد أخبار</h2>
                            <p class="news-content">لم يتم نشر أي أخبار حتى الآن عبر بوت التليجرام الخاص بالمسؤول.</p>
                        </div>`;
                    return;
                }

                // عرض الأخبار تنازلياً (الجديد أولاً)
                data.forEach(post => {
                    container.innerHTML += `
                        <article class="news-card">
                            <h2 class="news-title">${post.title}</h2>
                            <p class="news-content">${post.content}</p>
                            <div class="news-meta">
                                <span><i class="bi bi-building-university"></i> جامعة النيلين</span>
                                <span><i class="bi bi-check-circle-fill" style="color: #22c55e;"></i> موثق</span>
                            </div>
                        </article>
                    `;
                });

            } catch (error) {
                console.error("خطأ أثناء جلب البيانات:", error);
                container.innerHTML = `
                    <div class="news-card" style="border-color: #6D001A;">
                        <h2 class="news-title" style="color: #ff4444;"><i class="bi bi-wifi-off"></i> فشل الاتصال بالخادم</h2>
                        <p class="news-content">تأكد من أن تطبيق Termux يعمل على هاتفك، وأن كود البوت وجسر الـ SSH نشطين حالياً.</p>
                    </div>
                `;
            }
        }

        // تشغيل الدالة فور تحميل الصفحة
        fetchNews();
    </script>
</body>
</html>
